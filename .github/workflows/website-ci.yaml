name: Website CI

on:
  pull_request:
    branches:
      - main
    paths:
      - website/**
      - hasher-matcher-actioner/src/**
      - hasher-matcher-actioner/pyproject.toml
      - hasher-matcher-actioner/scripts/dump_openapi.py
      - hasher-matcher-actioner/scripts/openapi_dump_config.py
      - .github/workflows/website-ci.yaml
  push:
    branches-ignore:
      - main
    paths:
      - website/**
      - hasher-matcher-actioner/src/**
      - hasher-matcher-actioner/pyproject.toml
      - hasher-matcher-actioner/scripts/dump_openapi.py
      - hasher-matcher-actioner/scripts/openapi_dump_config.py
      - .github/workflows/website-ci.yaml

# Sets base permissions of the GITHUB_TOKEN
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        # with:
        #   fetch-depth: 0 # Not needed if lastUpdated is not enabled

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: hasher-matcher-actioner/pyproject.toml

      - name: Install HMA
        working-directory: hasher-matcher-actioner
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Dump HMA OpenAPI spec
        working-directory: hasher-matcher-actioner
        run: python scripts/dump_openapi.py ../website/content/public/hma/openapi.json

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: website/package.json
          run_install: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: "website/.node-version"
          cache-dependency-path: "website/pnpm-lock.yaml"
          check-latest: true
          cache: pnpm

      - name: Install dependencies
        working-directory: website
        run: pnpm install

      - name: Build with VitePress
        working-directory: website
        run: pnpm build
